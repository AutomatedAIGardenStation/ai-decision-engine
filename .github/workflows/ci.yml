# python-ai CI
# Runs on every push / PR to main.
# Installs deps, type-checks, lints, and runs the full pytest suite.

name: python-ai CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-python-ai-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-python-ai-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type-check with mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # warn only until full type coverage is reached

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-python-ai-${{ matrix.python-version }}
          path: coverage.xml

  # ── Notify ci-cd repo ──────────────────────────────────────────────────────
  notify-ci-cd:
    name: Notify GardenStation-ci-cd
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Dispatch python-ai-changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ACCESS_TOKEN }}
          script: |
            const branch = context.payload.pull_request
              ? context.payload.pull_request.head.ref
              : context.ref.replace(/^refs\/heads\//, '');
            const prNumber = context.payload.pull_request ? context.payload.pull_request.number : null;
            const status = '${{ needs.test.result }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDispatchEvent({
              owner: 'AutomatedAIGardenStation',
              repo: 'pipeline-orchestrator',
              event_type: 'python-ai-changed',
              client_payload: { branch, pr_number: prNumber, status }
            });
            console.log(`Dispatched python-ai-changed (${status})`);
